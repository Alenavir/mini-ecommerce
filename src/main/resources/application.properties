# App
spring.application.name=Mini E-commerce

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=none

# Security
jwt.secret=${JWT_SECRET}

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/liquibase/rootChangeLog.xml
logging.level.liquibase=DEBUG

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# Consumer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=order-group
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=ru.alenavir.mini_ecommerce.kafka.OrderCreatedEvent

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Kafka Topics
kafka.topics.order-events=order-events
kafka.topics.order-events-dlt=order-events.DLT
kafka.topics.partitions=3
kafka.topics.replicas=1

# Kafka ErrorHandler
kafka.consumer.backoff.initial-interval=1000
kafka.consumer.backoff.multiplier=2.0
kafka.consumer.backoff.max-interval=10000

# Redis TTL (minutes)
redis.ttl.orders=10
redis.ttl.last-orders=5
redis.ttl.products=30
redis.ttl.users=15